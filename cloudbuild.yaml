steps:
  # 1. User Service
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args: ['-c', 'docker pull $_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/user-service:latest || exit 0']
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-t', '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/user-service:latest',
      '--cache-from', '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/user-service:latest',
      './user-service'
    ]

  # 2. AI Service (Heavy)
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args: ['-c', 'docker pull $_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/ai-service:latest || exit 0']
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-t', '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/ai-service:latest',
      '--cache-from', '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/ai-service:latest',
      './ai-recommendation-service'
    ]

  # 3. Gamification Service
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/gamification-service:latest', './gamification-service']

  # 4. Notification Service
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/notification-service:latest', './notification-service']

  # 5. Mentoring Service
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/mentoring-service:latest', './mentor-mentee-module/backend']

  # 6. Common UI Shell (Heavy)
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args: ['-c', 'docker pull $_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/common-ui:latest || exit 0']
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-t', '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/common-ui:latest',
      '--cache-from', '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/common-ui:latest',
      '--build-arg', 'VITE_USER_SERVICE_URL=https://user-service-1095720168864.us-central1.run.app',
      '--build-arg', 'VITE_MENTORING_API_BASE_URL=https://user-service-1095720168864.us-central1.run.app',
      '--build-arg', 'VITE_GAMIFICATION_SERVICE_URL=https://gamification-service-1095720168864.us-central1.run.app',
      '--build-arg', 'VITE_AI_API_BASE_URL=https://ai-service-1095720168864.us-central1.run.app',
      '--build-arg', 'VITE_MENTOR_REMOTE_ENTRY=https://mentee-ui-1095720168864.us-central1.run.app/assets/remoteEntry.js',
      './common-ui-shell'
    ]

  # 7. Mentee UI
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-t', '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/mentee-ui:latest',
      '--build-arg', 'VITE_USER_SERVICE_PROXY_TARGET=https://user-service-1095720168864.us-central1.run.app',
      './mentor-mentee-module'
    ]

  # 8. Gamification Admin UI
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-t', '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/gamification-admin-ui:latest',
      '--build-arg', 'VITE_GAMIFICATION_API_PROXY=https://gamification-service-1095720168864.us-central1.run.app',
      './gamification-service/admin-ui'
    ]

  # 9. Auto-Deploy Common UI (Shell)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args: ['run', 'deploy', 'common-ui-1095720168864', '--image', '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/common-ui:latest', '--region', '$_LOCATION', '--platform', 'managed', '--quiet', '--port', '80']

  # 10. Auto-Deploy Mentee UI (Remote)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args: ['run', 'deploy', 'mentee-ui-1095720168864', '--image', '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/mentee-ui:latest', '--region', '$_LOCATION', '--platform', 'managed', '--quiet', '--port', '80']

  # # 11. Auto-Deploy Gamification Admin
  # - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  #   entrypoint: 'gcloud'
  #   args: ['run', 'deploy', 'gamification-service-1095720168864', '--image', '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/gamification-admin-ui:latest', '--region', '$_LOCATION', '--platform', 'managed', '--quiet', '--port', '80']

images:
  - '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/user-service:latest'
  - '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/ai-service:latest'
  - '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/gamification-service:latest'
  - '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/notification-service:latest'
  - '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/mentoring-service:latest'
  - '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/common-ui:latest'
  - '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/mentee-ui:latest'
  - '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/gamification-admin-ui:latest'

substitutions:
  _LOCATION: us-central1
  _REPO_NAME: mentor-mentee-repo

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
