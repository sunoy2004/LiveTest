services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mentoring
    ports:
      - "5432:5432"
    volumes:
      - mentoring_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mentoring"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mentoring_pgdata:
