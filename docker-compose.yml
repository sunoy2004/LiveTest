# Full stack: Postgres (multi-DB), Redis, user / gamification / notification / AI / mentoring services.
# Run from repo root: docker compose up --build -d
# Host ports: user 8000, ai 8001, gamification 8002, notification 8003, mentoring 8004, Postgres 5432, Redis 6379.
# DBs are created on first volume init via docker/postgres/init; apps run migrations/seeds on startup.

services:
  postgres:
    # pgvector extension for AI recommendation_db (vector similarity).
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - stack

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - stack

  user-service:
    build: ./user-service
    # Mount Python package so `/api/v1/search` and other route changes apply after `compose restart`
    # without rebuilding the image (image `COPY app` is still the fallback on first run).
    volumes:
      - ./user-service/app:/app/app
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/users_db
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-secret}
      # Longer default for local dev so tabs do not hit "Invalid or expired token" after an hour.
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-2880}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173}
      GAMIFICATION_SERVICE_URL: http://gamification-service:8000
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-change-me-in-production}
      USERSERVICE_RESET_ADMIN_PASSWORD: ${USERSERVICE_RESET_ADMIN_PASSWORD:-true}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()\""]
      interval: 5s
      timeout: 5s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - stack

  gamification-service:
    build: ./gamification-service
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/gamification_db
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-secret}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-change-me-in-production}
      GAMIFICATION_ADMIN_USERNAME: ${GAMIFICATION_ADMIN_USERNAME:-admin}
      GAMIFICATION_ADMIN_PASSWORD: ${GAMIFICATION_ADMIN_PASSWORD:-change-me-in-production}
      CORS_ALLOW_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173,http://localhost:5176,http://127.0.0.1:5176,http://localhost:4173,http://127.0.0.1:4173,http://localhost:8002,http://127.0.0.1:8002
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - stack

  notification-service:
    build: ./notification-service
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/notifications_db
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8003:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - stack

  ai-service:
    build: ./ai-recommendation-service
    # Mount app so route/code changes apply after `compose restart ai-service` without rebuild.
    volumes:
      - ./ai-recommendation-service/app:/app/app
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/recommendation_db
      REDIS_URL: redis://redis:6379/0
      USER_SERVICE_URL: http://user-service:8000
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-change-me-in-production}
      JWT_SECRET: ${JWT_SECRET:-secret}
      AI_TRUST_GATEWAY_HEADERS: ${AI_TRUST_GATEWAY_HEADERS:-false}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-opensource}
      USE_VERTEX: ${USE_VERTEX:-false}
      RECOMMENDATION_ENGINE: ${RECOMMENDATION_ENGINE:-pgvector}
      RECOMMENDATION_CACHE_TTL: ${RECOMMENDATION_CACHE_TTL:-300}
      HYBRID_SCORING: ${HYBRID_SCORING:-false}
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-service:
        condition: service_healthy
    networks:
      - stack

  mentoring-service:
    build: ./mentor-mentee-module/backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/mentoring
    ports:
      - "8004:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - stack

networks:
  # Compose key must match user-service/docker-compose.yml ("stack") so Docker reuses
  # the same named network mentor_stack without com.docker.compose.network label errors.
  stack:
    name: mentor_stack
    driver: bridge

volumes:
  pgdata:
