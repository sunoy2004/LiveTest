steps:
  # --- 1. User Service ---
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker pull $_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/user-service:latest || exit 0
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-t', '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/user-service:latest',
      '--cache-from', '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/user-service:latest',
      './user-service'
    ]

  # --- 2. AI Service ---
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker pull $_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/ai-service:latest || exit 0
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-t', '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/ai-service:latest',
      '--cache-from', '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/ai-service:latest',
      './ai-recommendation-service'
    ]

  # --- 3. Gamification Service ---
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker pull $_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/gamification-service:latest || exit 0
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-t', '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/gamification-service:latest',
      '--cache-from', '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/gamification-service:latest',
      './gamification-service'
    ]

  # --- 4. Notification Service ---
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker pull $_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/notification-service:latest || exit 0
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-t', '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/notification-service:latest',
      '--cache-from', '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/notification-service:latest',
      './notification-service'
    ]

  # --- 5. Mentoring Service ---
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker pull $_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/mentoring-service:latest || exit 0
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-t', '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/mentoring-service:latest',
      '--cache-from', '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/mentoring-service:latest',
      './mentor-mentee-module/backend'
    ]

  # --- 6. Common UI Shell ---
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker pull $_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/common-ui:latest || exit 0
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-t', '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/common-ui:latest',
      '--cache-from', '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/common-ui:latest',
      '--build-arg', 'VITE_USER_SERVICE_URL=$_USER_SERVICE_URL',
      '--build-arg', 'VITE_MENTORING_API_BASE_URL=$_MENTORING_URL',
      '--build-arg', 'VITE_GAMIFICATION_SERVICE_URL=$_GAMIFICATION_URL',
      '--build-arg', 'VITE_AI_API_BASE_URL=$_AI_URL',
      '--build-arg', 'VITE_MENTOR_REMOTE_ENTRY=$_MENTOR_REMOTE_ENTRY',
      './common-ui-shell'
    ]

  # --- 7. Mentee UI ---
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker pull $_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/mentee-ui:latest || exit 0
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-t', '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/mentee-ui:latest',
      '--cache-from', '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/mentee-ui:latest',
      '--build-arg', 'VITE_USER_SERVICE_URL=$_USER_SERVICE_URL',
      '--build-arg', 'VITE_MENTORING_API_BASE_URL=$_MENTORING_URL',
      '--build-arg', 'VITE_GAMIFICATION_SERVICE_URL=$_GAMIFICATION_URL',
      '--build-arg', 'VITE_AI_API_BASE_URL=$_AI_URL',
      './mentor-mentee-module'
    ]

  # --- 8. Gamification Admin UI ---
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker pull $_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/gamification-admin-ui:latest || exit 0
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-t', '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/gamification-admin-ui:latest',
      '--cache-from', '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/gamification-admin-ui:latest',
      '--build-arg', 'VITE_GAMIFICATION_API_PROXY=$_GAMIFICATION_URL',
      './gamification-service/admin-ui'
    ]

  # Push images for Cloud Run *before* deploy. (The `images:` block runs only after ALL steps,
  # so deploying in the same build requires an explicit push here first.)
  - id: push-rollout-targets
    name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        # When enabling optional deploys below: append to this list → ai-service gamification-service notification-service
        # and remove those three entries from `images:` (they must push before deploy, not after all steps).
        for img in user-service mentoring-service common-ui mentee-ui; do
          docker push "$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/$img:latest"
        done

  # Cloud Run: `gcloud run deploy <service>` updates the existing service (new revision); service name = $_CLOUD_RUN_*.
  - id: deploy-user-service
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    waitFor: ['push-rollout-targets']
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '$_CLOUD_RUN_USER_SERVICE'
      - '--image=$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/user-service:latest'
      - '--region=$_LOCATION'
      - '--platform=managed'
      # Mounts unix socket when DATABASE_URL uses ?host=/cloudsql/… (user-service: users_db; mentoring-service: mentoring).
      - '--add-cloudsql-instances=$_CLOUD_SQL_INSTANCE'
      - '--quiet'

  - id: deploy-mentoring-service
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    waitFor: ['push-rollout-targets']
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '$_CLOUD_RUN_MENTORING_SERVICE'
      - '--image=$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/mentoring-service:latest'
      - '--region=$_LOCATION'
      - '--platform=managed'
      - '--add-cloudsql-instances=$_CLOUD_SQL_INSTANCE'
      - '--quiet'

  - id: deploy-common-ui
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    waitFor: ['push-rollout-targets']
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '$_CLOUD_RUN_COMMON_UI'
      - '--image=$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/common-ui:latest'
      - '--region=$_LOCATION'
      - '--platform=managed'
      # nginx listens on 80 in this image; Cloud Run default probe port is 8080 unless overridden
      - '--port=80'
      - '--quiet'

  - id: deploy-mentee-ui
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    waitFor: ['push-rollout-targets']
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '$_CLOUD_RUN_MENTEE_UI'
      - '--image=$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/mentee-ui:latest'
      - '--region=$_LOCATION'
      - '--platform=managed'
      - '--port=80'
      - '--quiet'

  # --- Optional Cloud Run deploy: AI, Gamification, Notification (disabled) ---
  # Enable: extend `for img in …` in push-rollout-targets with ai-service gamification-service notification-service,
  # remove those three lines from `images:` below, then uncomment the blocks under this banner.
  #
  # - id: deploy-ai-service
  #   name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  #   waitFor: ['push-rollout-targets']
  #   entrypoint: 'gcloud'
  #   args:
  #     - 'run'
  #     - 'deploy'
  #     - '$_CLOUD_RUN_AI_SERVICE'
  #     - '--image=$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/ai-service:latest'
  #     - '--region=$_LOCATION'
  #     - '--platform=managed'
  #     - '--quiet'
  #
  # - id: deploy-gamification-service
  #   name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  #   waitFor: ['push-rollout-targets']
  #   entrypoint: 'gcloud'
  #   args:
  #     - 'run'
  #     - 'deploy'
  #     - '$_CLOUD_RUN_GAMIFICATION_SERVICE'
  #     - '--image=$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/gamification-service:latest'
  #     - '--region=$_LOCATION'
  #     - '--platform=managed'
  #     - '--quiet'
  #
  # - id: deploy-notification-service
  #   name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  #   waitFor: ['push-rollout-targets']
  #   entrypoint: 'gcloud'
  #   args:
  #     - 'run'
  #     - 'deploy'
  #     - '$_CLOUD_RUN_NOTIFICATION_SERVICE'
  #     - '--image=$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/notification-service:latest'
  #     - '--region=$_LOCATION'
  #     - '--platform=managed'
  #     - '--quiet'

images:
  # When enabling commented deploy steps for ai / gamification / notification: DELETE the next three lines
  # (those images must be pushed in push-rollout-targets before deploy, same pattern as user-service).
  - '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/ai-service:latest'
  - '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/gamification-service:latest'
  - '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/notification-service:latest'
  - '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/gamification-admin-ui:latest'
  # user-service, mentoring-service, common-ui, mentee-ui: pushed in push-rollout-targets (before deploy)

substitutions:
  _LOCATION: us-central1
  _REPO_NAME: mentor-mentee-repo
  # Cloud SQL instance connection name PROJECT:REGION:INSTANCE (unix socket mount for default DATABASE_URL in repo).
  # Omit from deploy (and use TCP DATABASE_URL) only if you do not use Cloud SQL for these services.
  _CLOUD_SQL_INSTANCE: 'yanc-website:us-central1:mentor-mentee-db'
  # Existing Cloud Run *service names* (console list). Deploy targets these names → new revisions only.
  _CLOUD_RUN_USER_SERVICE: user-service-1095720168864
  _CLOUD_RUN_MENTORING_SERVICE: mentoring-service-1095720168864
  _CLOUD_RUN_COMMON_UI: common-ui-1095720168864
  _CLOUD_RUN_MENTEE_UI: mentee-ui-1095720168864
  # Uncomment when enabling optional Cloud Run deploy blocks above:
  # _CLOUD_RUN_AI_SERVICE: ai-service-1095720168864
  # _CLOUD_RUN_GAMIFICATION_SERVICE: gamification-service-1095720168864
  # _CLOUD_RUN_NOTIFICATION_SERVICE: notification-service-1095720168864
  _USER_SERVICE_URL: "https://user-service-1095720168864-1095720168864.us-central1.run.app"
  _MENTORING_URL: "https://mentoring-service-1095720168864-1095720168864.us-central1.run.app"
  _GAMIFICATION_URL: "https://gamification-service-1095720168864-1095720168864.us-central1.run.app"
  _AI_URL: "https://ai-service-1095720168864-1095720168864.us-central1.run.app"
  _MENTOR_REMOTE_ENTRY: "https://mentee-ui-1095720168864-1095720168864.us-central1.run.app/assets/remoteEntry.js"

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
